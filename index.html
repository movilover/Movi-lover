<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Movie Lover - Ultra Fast Pro</title>
  
  <script src="//libtl.com/sdk.js" data-zone="10799185" data-sdk="show_10799185"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Poppins', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }

    /* Header */
    .header { background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a; }
    .header-logo h1 { font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; }
    .header-right { display: flex; gap: 15px; align-items: center; }
    .nav-icon { font-size: 20px; color: #fff; cursor: pointer; position: relative; transition: 0.3s; }
    .nav-icon:active { transform: scale(0.9); }
    .tg-icon { color: #0088cc; font-size: 24px; }
    .dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: none; box-shadow: 0 0 5px #ff0000; }

    /* Fast Skeleton */
    .skeleton-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px; }
    .skeleton-card { background: #111; border-radius: 15px; height: 165px; position: relative; overflow: hidden; border: 1px solid #1a1a1a; }
    .skeleton-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); animation: shm 1.2s infinite; }
    @keyframes shm { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* UI Components */
    .top-info-container { margin: 15px; background: linear-gradient(145deg, #0d0d0d, #111); border-radius: 18px; border: 1px solid #1a1a1a; overflow: hidden; }
    .balance-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 15px; border-bottom: 1px solid #1a1a1a; }
    .point-box { background: #ff0000; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; box-shadow: 0 4px 10px rgba(255,0,0,0.3); }
    .scrolling-notice { background: rgba(255,235,59,0.05); padding: 8px 15px; overflow: hidden; white-space: nowrap; }
    .scrolling-notice p { display: inline-block; animation: marquee 12s linear infinite; color: #ffeb3b; font-size: 11px; font-weight: 500; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* Referral Box */
    .refer-card { background: #0d0d0d; margin: 0 15px 15px; padding: 14px; border-radius: 15px; border: 1px solid #1a1a1a; }
    .ref-link-box { background: #000; padding: 12px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    .ref-url { font-size: 10px; color: #555; width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ref-actions { display: flex; flex-direction: column; align-items: center; gap: 4px; border-left: 1px solid #222; padding-left: 12px; }
    .ref-coin { color: #ffd700; font-size: 10px; font-weight: 800; }
    .ref-copy-btn { color: #ff0000; font-size: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

    /* PREMIUM SEARCH BAR - REDESIGNED */
    .search-container { position: relative; width: 92%; margin: 5px auto 20px; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #ff0000; font-size: 15px; z-index: 2; }
    .search-bar { width: 100%; padding: 15px 20px 15px 50px; border-radius: 35px; background: #121212; border: 1.5px solid #252525; color: #fff; outline: none; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.7); transition: all 0.3s ease; }
    .search-bar:focus { border-color: #ff0000; background: #181818; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
    .search-bar::placeholder { color: #555; font-weight: 400; }

    /* Content Area */
    .category-bar { display: flex; gap: 10px; padding: 0 15px 15px; overflow-x: auto; scrollbar-width: none; }
    .cat-chip { padding: 9px 22px; background: #121212; border-radius: 25px; font-size: 12px; white-space: nowrap; border: 1px solid #222; color: #999; cursor: pointer; transition: 0.3s; }
    .cat-chip.active { background: #ff0000; color: #fff; border-color: #ff0000; box-shadow: 0 4px 12px rgba(255,0,0,0.3); }
    
    .video-grid { padding: 0 12px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .video-card { background: #0d0d0d; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .fav-btn { position: absolute; top: 10px; right: 10px; color: #fff; background: rgba(0,0,0,0.5); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; z-index: 10; }
    .fav-btn.active { color: #ff0000; }
    .video-card img { width: 100%; height: 115px; object-fit: cover; background: #000; }
    .video-title-box { padding: 10px; }
    .video-title { font-size: 11px; height: 32px; color: #eee; overflow: hidden; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    /* Admin Panel */
    .admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; padding: 20px; display: none; overflow-y: auto; }
    .admin-card { background: #0d0d0d; padding: 18px; border-radius: 18px; border: 1px solid #222; margin-bottom: 15px; }
    .admin-input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1.5px solid #333; color: #fff; border-radius: 12px; outline: none; }
    .btn-premium { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 800; margin-top: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .btn-premium:active { transform: scale(0.97); }

    /* Modals */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: #111; width: 88%; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #222; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo" id="adminTrigger"><h1>MOVIE<span style="color:red;">LOVER</span></h1></div>
    <div class="header-right">
      <div id="tgLinkBtn" class="nav-icon tg-icon"><i class="fab fa-telegram"></i></div>
      <div class="nav-icon" onclick="setFilter('Favorites')"><i class="fa fa-heart"></i></div>
      <div class="nav-icon" onclick="showNotify()"><i class="fa fa-bell"></i><div class="dot" id="notifDot"></div></div>
    </div>
  </div>

  <div class="top-info-container">
    <div class="balance-row">
      <span style="font-size: 11px; font-weight: 600; color: #999;">MY BALANCE:</span>
      <div class="point-box" id="pointDisplay">0 Points</div>
    </div>
    <div class="scrolling-notice">
      <p id="marqueeText">🎁 ১০০ পয়েন্ট হলে ৩ দিন অ্যাড ছাড়া মুভি দেখতে পারবেন! রেফার করে ১০ পয়েন্ট জিতুন।</p>
    </div>
  </div>

  <div class="refer-card">
    <div class="ref-link-box">
      <span class="ref-url" id="refLinkText">Generating link...</span>
      <div class="ref-actions">
        <div class="ref-coin"><i class="fa fa-coins"></i> +10</div>
        <div class="ref-copy-btn" onclick="copyRef()">COPY LINK</div>
      </div>
    </div>
  </div>

  <div class="search-container">
    <i class="fa fa-search search-icon"></i>
    <input type="text" id="searchInput" class="search-bar" placeholder="পছন্দের মুভি বা নাটক খুঁজুন..." oninput="searchVideos()">
  </div>

  <div class="category-bar" id="categoryBar"></div>

  <div id="videoSection">
    <div id="skeletonLoader" class="skeleton-container">
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
    <div class="video-grid" id="videoList" style="display: none;"></div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div id="loginArea" class="admin-card">
      <h2 style="text-align:center; color:red; margin-bottom:20px;">ADMIN ACCESS</h2>
      <input type="password" id="adminPass" class="admin-input" placeholder="প্রবেশের পিন কোড লিখুন">
      <button onclick="loginAdmin()" class="btn-premium" style="background:red; color:#fff;">Login Admin</button>
      <button onclick="closeAdmin()" class="btn-premium" style="background:#222; color:#fff;">Cancel</button>
    </div>
    <div id="adminContent" style="display:none;">
      <div class="admin-card">
        <h3>App Configurations</h3>
        <input id="tgLinkInput" class="admin-input" placeholder="Telegram Channel URL">
        <button onclick="saveTgLink()" class="btn-premium" style="background:#0088cc; color:#fff;">Update Telegram</button>
        <input id="notifInput" class="admin-input" placeholder="Notice Text" style="margin-top:12px;">
        <button onclick="saveNotif()" class="btn-premium" style="background:#ff0080; color:#fff;">Update Notice</button>
        <input id="directLinkInput" class="admin-input" placeholder="Monetag Ad Link" style="margin-top:12px;">
        <button onclick="saveDirectLink()" class="btn-premium" style="background:red; color:#fff;">Update Ad Link</button>
      </div>
      <div class="admin-card">
        <h3>Categories</h3>
        <input id="newCatInput" class="admin-input" placeholder="Category Name">
        <button onclick="addCategory()" class="btn-premium" style="background:orange; color:#fff;">Add New Category</button>
        <div id="adminCategoryList" style="margin-top:10px;"></div>
      </div>
      <div class="admin-card">
        <h3>Upload Content</h3>
        <input id="vTitle" class="admin-input" placeholder="Movie Title">
        <input id="vLink" class="admin-input" placeholder="Video Link">
        <input id="vThumb" class="admin-input" placeholder="Thumbnail URL">
        <select id="vCatSelect" class="admin-input"></select>
        <button onclick="saveVideo()" class="btn-premium" style="background:green; color:#fff;">Upload Movie</button>
      </div>
      <div class="admin-card"><h3>Manage Movies</h3><div id="adminVideoList"></div></div>
      <button onclick="closeAdmin()" class="btn-premium" style="background:#333; color:#fff;">Logout Admin</button>
    </div>
  </div>

  <div class="modal" id="notifModal">
    <div class="modal-content">
      <h3 style="color:#fff; margin-bottom:12px;">নোটিশ বোর্ড</h3>
      <p id="adminNoticeText" style="font-size:12px; color:#aaa; line-height:1.6;"></p>
      <button onclick="closeNotif()" class="btn-premium" style="background:#222; color:#fff;">বন্ধ করুন</button>
    </div>
  </div>

  <div class="modal" id="optionsModal">
    <div class="modal-content">
      <img id="modalThumb" style="width:100%; border-radius:18px; margin-bottom:18px; height:160px; object-fit:cover; border:1px solid #222;">
      <h4 id="modalTitle" style="margin-bottom:15px;"></h4>
      <button id="watchAdBtn" class="btn-premium" style="background:red; color:#fff;">WATCH AD TO UNLOCK (0/3)</button>
      <button id="playNowBtn" class="btn-premium" style="background:green; color:#fff; display:none;">▶ PLAY MOVIE NOW</button>
      <button onclick="closeModal()" style="color:#666; margin-top:12px; font-size:12px; background:none; border:none; cursor:pointer;">CLOSE WINDOW</button>
    </div>
  </div>

  <script>
    const BIN_ID = "69cb78f8aaba882197ad9f65", MASTER_KEY = "$2a$10$mr0rpThgZSw.qns0mo/jEerdTDBeZVCCQEadGMUTo0CBCMbCMZ1Gm";
    let videos = [], categories = [], notice = "", directLink = "", telegramLink = "", userPoints = 0, currentFilter = "All", adCount = 0, currentV = null;
    let favorites = JSON.parse(localStorage.getItem('favs')) || [];
    let userId = window.Telegram.WebApp.initDataUnsafe?.user?.id || "user" + Math.floor(Math.random()*1000);

    // Extreme Fast Initialization
    async function init() {
        document.getElementById('refLinkText').innerText = `https://t.me/MovieLoverBot/app?startapp=${userId}`;
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await res.json();
            
            videos = data.record.videos || [];
            categories = data.record.categories || [];
            notice = data.record.notice || "";
            directLink = data.record.directLink || "";
            telegramLink = data.record.telegramLink || "https://t.me/MovieLover";
            
            document.getElementById('tgLinkBtn').onclick = () => window.open(telegramLink, '_blank');
            if(notice) {
                document.getElementById('notifDot').style.display = 'block';
                document.getElementById('marqueeText').innerText = notice;
            }
            
            renderUI();
            
            // Immediate content show
            document.getElementById('skeletonLoader').style.display = 'none';
            document.getElementById('videoList').style.display = 'grid';
        } catch (e) { document.getElementById('skeletonLoader').style.display = 'none'; }
    }

    function renderUI() {
        document.getElementById('pointDisplay').innerText = `${userPoints} Points`;
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = `<div class="cat-chip ${currentFilter==='All'?'active':''}" onclick="setFilter('All')">All</div>`;
        categories.forEach(c => bar.innerHTML += `<div class="cat-chip ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`);
        renderVideos();
    }

    function renderVideos(term = "") {
        const list = document.getElementById('videoList'); list.innerHTML = '';
        let src = (currentFilter === 'Favorites') ? videos.filter(v => favorites.includes(v.link)) : videos;
        const filtered = src.filter(v => (currentFilter === 'All' || currentFilter === 'Favorites' || v.category === currentFilter) && v.title.toLowerCase().includes(term.toLowerCase()));
        
        filtered.forEach(v => {
            const isFav = favorites.includes(v.link);
            list.innerHTML += `<div class="video-card">
                <div class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${v.link}',event)"><i class="fa fa-heart"></i></div>
                <div onclick="openOptions(${videos.indexOf(v)})">
                    <img src="${v.thumb}" loading="lazy">
                    <div class="video-title-box"><div class="video-title">${v.title}</div></div>
                </div>
            </div>`;
        });
    }

    function toggleFav(l, e) { e.stopPropagation(); if(favorites.includes(l)) favorites = favorites.filter(f => f !== l); else favorites.push(l); localStorage.setItem('favs', JSON.stringify(favorites)); renderVideos(); }
    function copyRef() { navigator.clipboard.writeText(document.getElementById('refLinkText').innerText); alert("Referral link copied!"); }
    function setFilter(c) { currentFilter = c; renderUI(); }
    function searchVideos() { renderVideos(document.getElementById('searchInput').value); }

    function openOptions(idx) {
        currentV = videos[idx]; adCount = 0;
        document.getElementById('modalTitle').innerText = currentV.title;
        document.getElementById('modalThumb').src = currentV.thumb;
        document.getElementById('watchAdBtn').style.display = 'block';
        document.getElementById('watchAdBtn').innerText = `START AD TASK (0/3)`;
        document.getElementById('playNowBtn').style.display = 'none';
        document.getElementById('optionsModal').style.display = 'flex';
    }

    document.getElementById('watchAdBtn').onclick = () => {
        if (typeof window.show_10799185 === 'function') window.show_10799185().then(() => step()).catch(() => step());
        else step();
    };
    function step() { adCount++; document.getElementById('watchAdBtn').innerText = `TASK ${adCount} DONE`; if(adCount >= 3) { userPoints += 10; renderUI(); document.getElementById('watchAdBtn').style.display = 'none'; document.getElementById('playNowBtn').style.display = 'block'; } }
    document.getElementById('playNowBtn').onclick = () => { if(directLink) window.open(directLink, '_blank'); setTimeout(() => window.open(currentV.link, '_blank'), 600); };

    // Admin Panel Logic
    let clks = 0;
    document.getElementById('adminTrigger').onclick = () => { clks++; if(clks>=5){document.getElementById('adminPanel').style.display='block'; clks=0;}};
    function loginAdmin() { if(document.getElementById('adminPass').value === "153781") { document.getElementById('loginArea').style.display='none'; document.getElementById('adminContent').style.display='block'; updateAdminUI(); } }
    
    function updateAdminUI() {
        document.getElementById('vCatSelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('tgLinkInput').value = telegramLink;
        document.getElementById('notifInput').value = notice;
        document.getElementById('directLinkInput').value = directLink;
        const cList = document.getElementById('adminCategoryList'); cList.innerHTML = '';
        categories.forEach((c, i) => cList.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:5px; border:1px solid #222;"><span>${c}</span><button onclick="deleteCategory(${i})" style="color:red; background:none; border:none;">Del</button></div>`);
        const vList = document.getElementById('adminVideoList'); vList.innerHTML = '';
        videos.forEach((v, i) => vList.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:5px; border:1px solid #222;"><span style="font-size:10px;">${v.title}</span><button onclick="deleteVideo(${i})" style="color:red; background:none; border:none;">Del</button></div>`);
    }

    async function sync() { await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY }, body: JSON.stringify({ videos, categories, notice, directLink, telegramLink }) }); }
    function saveTgLink() { telegramLink = document.getElementById('tgLinkInput').value; sync(); alert("Telegram Updated!"); }
    function saveNotif() { notice = document.getElementById('notifInput').value; sync(); alert("Notice Updated!"); }
    function saveDirectLink() { directLink = document.getElementById('directLinkInput').value; sync(); alert("Ad Link Updated!"); }
    function addCategory() { const c = document.getElementById('newCatInput').value; if(c){categories.push(c); sync(); updateAdminUI(); renderUI(); }}
    function deleteCategory(i) { categories.splice(i,1); sync(); updateAdminUI(); }
    function saveVideo() { const v = { title: document.getElementById('vTitle').value, link: document.getElementById('vLink').value, thumb: document.getElementById('vThumb').value, category: document.getElementById('vCatSelect').value }; videos.unshift(v); sync(); updateAdminUI(); renderUI(); }
    function deleteVideo(i) { videos.splice(i,1); sync(); updateAdminUI(); }

    window.closeModal = () => document.getElementById('optionsModal').style.display = 'none';
    window.closeNotif = () => document.getElementById('notifModal').style.display = 'none';
    function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
    function showNotify() { document.getElementById('adminNoticeText').innerText = notice || "কোনো নতুন আপডেট নেই।"; document.getElementById('notifModal').style.display = 'flex'; document.getElementById('notifDot').style.display = 'none'; }
    
    init();
  </script>
</body>
</html>
